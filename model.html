<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>3D Viewer — Bassoon Engineering</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surface: rgba(22, 27, 34, 0.92);
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --accent:  #58a6ff;
  --accent2: #79c0ff;
}

html, body { height: 100%; background: var(--bg); overflow: hidden; }

/* ── Model viewer fills screen ── */
model-viewer {
  width: 100vw;
  height: 100vh;
  background-color: var(--bg);
  --poster-color: var(--bg);
}

/* ── Top bar ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  background: linear-gradient(180deg, rgba(13,17,23,.95) 70%, transparent 100%);
}
#back-btn {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(10px);
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}
#model-title {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#model-tag {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--accent);
  border: 1px solid rgba(88,166,255,.3);
  border-radius: 6px;
  padding: 3px 8px;
}

/* ── Info panel (bottom) ── */
#info-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 0 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
  pointer-events: none;
}

#info-toggle {
  pointer-events: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent2);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  gap: 6px;
  -webkit-tap-highlight-color: transparent;
}

#info-card {
  pointer-events: auto;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  backdrop-filter: blur(16px);
  display: none;
}
#info-card.open { display: block; }
#info-card h3 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .10em;
  color: var(--accent);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #21262d;
}
.legend-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: #c9d1d9; margin-bottom: 5px;
}
.legend-swatch {
  width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.15);
}
.dim-table { width: 100%; margin-top: 8px; }
.dim-row {
  display: flex; justify-content: space-between;
  font-size: 11px; padding: 2px 0;
}
.dim-key { color: var(--muted); }
.dim-val { color: var(--text); font-variant-numeric: tabular-nums; }

/* ── Custom AR button slot ── */
#ar-button {
  background: rgba(88,166,255,.15);
  border: 1px solid rgba(88,166,255,.5);
  border-radius: 10px;
  color: var(--accent2);
  font-size: 14px;
  font-weight: 700;
  padding: 12px 22px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Loading overlay */
#loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 20;
  transition: opacity .3s;
}
#loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading model…</p>
</div>

<model-viewer
  id="mv"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  auto-rotate-delay="1000"
  rotation-per-second="20deg"
  shadow-intensity="1"
  shadow-softness="0.8"
  environment-image="neutral"
  exposure="1.1"
  tone-mapping="aces"
  interaction-prompt="none"
>
  <button slot="ar-button" id="ar-button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M5 3H3a2 2 0 0 0-2 2v2"/><path d="M19 3h2a2 2 0 0 1 2 2v2"/>
      <path d="M5 21H3a2 2 0 0 1-2-2v-2"/><path d="M19 21h2a2 2 0 0 0 2-2v-2"/>
      <path d="M12 8l-4 2.4V16l4 2.4 4-2.4v-5.6L12 8z"/>
    </svg>
    View in AR
  </button>
</model-viewer>

<div id="topbar">
  <a id="back-btn" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </a>
  <div id="model-title">Loading…</div>
  <div id="model-tag"></div>
</div>

<div id="info-panel">
  <button id="info-toggle">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Model info
  </button>
  <div id="info-card">
    <h3 id="info-title">Details</h3>
    <div id="legend-rows"></div>
    <div class="dim-table" id="dim-rows"></div>
  </div>
</div>

<script>
const MODELS = {
  bassoon_reed: {
    name: "Bassoon Reed — Generated v5",
    tag: "Generated",
    glb: "models/bassoon_reed.glb",
    legend: [
      { color: "#F0D878", label: "Cane — blade" },
      { color: "#B07830", label: "Cane — tube" },
      { color: "#E0AD22", label: "Brass wire" },
      { color: "#C80A06", label: "Red thread" },
    ],
    dims: [
      ["Total length",   "56 mm"],
      ["Blade width",    "15 mm (tip)"],
      ["Tube Ø",         "7.1 mm"],
      ["Wall thickness", "0.52 mm"],
      ["Model",          "generate_reed.py v5"],
      ["Units",          "mm"],
    ],
  },
  bassoon_reed_all_scans: {
    name: "DAVID Laser Scan Overlays",
    tag: "Scan overlay",
    glb: "models/bassoon_reed_all_scans.glb",
    legend: [
      { color: "#F2AE1E", label: "Generated model (wireframe)" },
      { color: "#FF14C7", label: "cana1.obj" },
      { color: "#00D9FF", label: "cana1horiontal.obj" },
      { color: "#2DFF2D", label: "cana1vertical.obj" },
      { color: "#FF8C00", label: "cana3.obj" },
      { color: "#9A19FF", label: "canatumbada.obj" },
    ],
    dims: [
      ["Total length", "56 mm"],
      ["Blade width",  "15 mm (tip)"],
      ["Tube Ø",       "7.1 mm"],
      ["Scanner",      "DAVID SLS-3 laser"],
      ["Scans",        "5 sessions"],
      ["Units",        "mm"],
    ],
  },
  scan_shaped_reed: {
    name: "Scanned Shaped Reed",
    tag: "Laser scan",
    glb: "models/scan_shaped_reed.glb",
    legend: [],
    dims: [
      ["Type",    "Laser scan"],
      ["Scanner", "DAVID SLS-3"],
      ["Units",   "mm"],
    ],
  },
  bassoon_reed_point_cloud: {
    name: "Reed Point Cloud",
    tag: "Point cloud",
    glb: "models/bassoon_reed_point_cloud.glb",
    legend: [],
    dims: [
      ["Type",    "Point cloud"],
      ["Source",  "DAVID SLS-3 scan"],
      ["Units",   "mm"],
    ],
  },
};

// ── Parse model from URL ──────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const modelId = params.get("m") || "bassoon_reed";
const m = MODELS[modelId] || MODELS["bassoon_reed"];

// ── Set up model-viewer ───────────────────────────────────────────────────────
const mv = document.getElementById("mv");
mv.src = m.glb;
document.title = m.name + " — Bassoon Engineering";

// ── Populate UI ───────────────────────────────────────────────────────────────
document.getElementById("model-title").textContent = m.name;
document.getElementById("model-tag").textContent = m.tag;
document.getElementById("info-title").textContent = m.name;

const legendEl = document.getElementById("legend-rows");
m.legend.forEach(({ color, label }) => {
  legendEl.innerHTML += `<div class="legend-row">
    <div class="legend-swatch" style="background:${color}"></div>
    <span>${label}</span>
  </div>`;
});

const dimEl = document.getElementById("dim-rows");
m.dims.forEach(([k, v]) => {
  dimEl.innerHTML += `<div class="dim-row">
    <span class="dim-key">${k}</span>
    <span class="dim-val">${v}</span>
  </div>`;
});

// Hide info toggle if no info
if (m.legend.length === 0 && m.dims.length === 0) {
  document.getElementById("info-toggle").style.display = "none";
}

// ── Info panel toggle ─────────────────────────────────────────────────────────
document.getElementById("info-toggle").addEventListener("click", () => {
  document.getElementById("info-card").classList.toggle("open");
});

// ── Hide loading overlay on model load ────────────────────────────────────────
mv.addEventListener("load", () => {
  document.getElementById("loading-overlay").classList.add("hidden");
});
mv.addEventListener("error", (e) => {
  document.getElementById("loading-overlay").querySelector("p").textContent =
    "Failed to load model.";
  console.error(e);
});
</script>

</body>
</html>
